<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Polymarket ML Trader — Live Signals</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24;
      --border:#2a2a3a; --green:#00ff88; --red:#ff4466;
      --yellow:#ffcc00; --blue:#4488ff; --text:#e8e8f0; --text-dim:#888899;
      --font-mono:"Space Mono",monospace; --font-display:"Syne",sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-mono); min-height:100vh; }
    body::before { content:""; position:fixed; inset:0;
      background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0; }
    .container { max-width:1400px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }
    header { padding:32px 0 24px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center; }
    .logo { font-family:var(--font-display); font-size:24px; font-weight:800; }
    .logo span { color:var(--green); }
    .live-badge { display:flex; align-items:center; gap:8px; font-size:11px;
      color:var(--green); letter-spacing:0.1em; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:var(--green);
      animation:blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .status-bar { display:flex; justify-content:space-between; align-items:center;
      padding:12px 0; border-bottom:1px solid var(--border); font-size:11px; color:var(--text-dim); }
    .refresh-btn { background:none; border:1px solid var(--green); color:var(--green);
      font-family:var(--font-mono); font-size:11px; padding:6px 16px; cursor:pointer;
      letter-spacing:0.1em; transition:all 0.2s; }
    .refresh-btn:hover { background:var(--green); color:var(--bg); }
    .refresh-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .signals-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
      gap:16px; padding:24px 0; }
    .signal-card { background:var(--surface); border:1px solid var(--border);
      padding:20px; position:relative; overflow:hidden;
      transition:transform 0.2s, border-color 0.2s; cursor:pointer; }
    .signal-card:hover { transform:translateY(-2px); }
    .signal-card.BUY  { border-left:4px solid var(--green); }
    .signal-card.SELL { border-left:4px solid var(--red); }
    .signal-card.HOLD { border-left:4px solid var(--text-dim); }
    .signal-card::before { content:""; position:absolute; top:0;left:0;right:0; height:1px; }
    .signal-card.BUY::before  { background:var(--green); }
    .signal-card.SELL::before { background:var(--red); }
    .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .question { font-size:12px; color:var(--text); line-height:1.4; flex:1; padding-right:12px; }
    .signal-badge { font-family:var(--font-display); font-size:13px; font-weight:800;
      padding:4px 10px; border-radius:2px; white-space:nowrap; }
    .signal-badge.BUY  { background:rgba(0,255,136,0.15); color:var(--green); border:1px solid var(--green); }
    .signal-badge.SELL { background:rgba(255,68,102,0.15); color:var(--red);   border:1px solid var(--red); }
    .signal-badge.HOLD { background:rgba(136,136,153,0.15); color:var(--text-dim); border:1px solid var(--border); }
    .confidence-bar { height:3px; background:var(--border); margin:12px 0; border-radius:2px; }
    .confidence-fill { height:100%; border-radius:2px; transition:width 0.5s ease; }
    .BUY  .confidence-fill { background:var(--green); }
    .SELL .confidence-fill { background:var(--red); }
    .HOLD .confidence-fill { background:var(--text-dim); }
    .card-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
    .card-stat { background:var(--surface2); padding:8px; text-align:center; }
    .card-stat-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; }
    .card-stat-value { font-size:14px; font-weight:700; margin-top:3px; }
    .card-stat-value.up   { color:var(--green); }
    .card-stat-value.down { color:var(--red); }
    .card-stat-value.neutral { color:var(--text); }
    .category-tag { font-size:9px; color:var(--text-dim); letter-spacing:0.1em;
      text-transform:uppercase; margin-top:10px; }
    .volume { font-size:10px; color:var(--text-dim); margin-top:4px; }
    .loading { text-align:center; padding:80px 0; color:var(--text-dim); }
    .loading-spinner { width:32px; height:32px; border:2px solid var(--border);
      border-top-color:var(--green); border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .error-msg { text-align:center; padding:60px; color:var(--red); font-size:13px; }
    .summary-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
      padding:20px 0; border-bottom:1px solid var(--border); }
    .summary-item { text-align:center; }
    .summary-value { font-family:var(--font-display); font-size:24px; font-weight:800; }
    .summary-label { font-size:10px; color:var(--text-dim); text-transform:uppercase;
      letter-spacing:0.1em; margin-top:4px; }
    .last-update { font-size:10px; color:var(--text-dim); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="logo">Polymarket <span>ML Trader</span></div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Live Signal Dashboard · Orderflow 001</div>
    </div>
    <div style="display:flex;align-items:center;gap:20px">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button class="refresh-btn" onclick="loadSignals()" id="refreshBtn">⟳ REFRESH</button>
    </div>
  </header>

  <div class="status-bar">
    <span id="statusText">Connecting to Polymarket API...</span>
    <span class="last-update" id="lastUpdate"></span>
  </div>

  <div class="summary-bar" id="summaryBar" style="display:none">
    <div class="summary-item">
      <div class="summary-value" id="totalSignals" style="color:var(--text)">—</div>
      <div class="summary-label">Markets Analyzed</div>
    </div>
    <div class="summary-item">
      <div class="summary-value" id="buyCount" style="color:var(--green)">—</div>
      <div class="summary-label">BUY Signals</div>
    </div>
    <div class="summary-item">
      <div class="summary-value" id="sellCount" style="color:var(--red)">—</div>
      <div class="summary-label">SELL Signals</div>
    </div>
    <div class="summary-item">
      <div class="summary-value" id="avgConf" style="color:var(--yellow)">—</div>
      <div class="summary-label">Avg Confidence</div>
    </div>
  </div>

  <div id="signalsContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>Fetching live market data...</div>
    </div>
  </div>
</div>
<script>
async function loadSignals() {
  const btn = document.getElementById("refreshBtn");
  const status = document.getElementById("statusText");
  btn.disabled = true;
  btn.textContent = "⟳ LOADING...";
  status.textContent = "Fetching live data from Polymarket...";
  try {
    const resp = await fetch("http://localhost:5000/api/signals");
    const data = await resp.json();
    if (data.status !== "ok") throw new Error(data.message);
    const signals = data.signals;
    const buys  = signals.filter(s => s.signal === "BUY").length;
    const sells = signals.filter(s => s.signal === "SELL").length;
    const avgConf = (signals.reduce((a,s) => a + s.confidence, 0) / signals.length * 100).toFixed(0);
    document.getElementById("totalSignals").textContent = signals.length;
    document.getElementById("buyCount").textContent = buys;
    document.getElementById("sellCount").textContent = sells;
    document.getElementById("avgConf").textContent = avgConf + "%";
    document.getElementById("summaryBar").style.display = "grid";
    const container = document.getElementById("signalsContainer");
    container.innerHTML = `<div class="signals-grid">${signals.map(s => renderCard(s)).join("")}</div>`;
    status.textContent = `✓ ${signals.length} markets analyzed · ${buys} BUY · ${sells} SELL`;
    document.getElementById("lastUpdate").textContent = "Updated: " + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById("signalsContainer").innerHTML =
      `<div class="error-msg">⚠️ Cannot connect to server<br/>
        <span style="font-size:11px;color:var(--text-dim);margin-top:8px;display:block">
          Run: <code style="color:var(--green)">python app.py</code> in your terminal
        </span></div>`;
    status.textContent = "Error: " + e.message;
  }
  btn.disabled = false;
  btn.textContent = "⟳ REFRESH";
}

function renderCard(s) {
  const confPct = (s.confidence * 100).toFixed(0);
  const diff24Color = s.diff24 >= 0 ? "up" : "down";
  const diff24Sign  = s.diff24 >= 0 ? "+" : "";
  const zColor = Math.abs(s.zscore) > 1.5 ? (s.zscore > 0 ? "down" : "up") : "neutral";
  const vol = s.volume24hr > 1000 ? "$" + (s.volume24hr/1000).toFixed(1) + "k" : "$" + s.volume24hr.toFixed(0);
  return `
  <div class="signal-card ${s.signal}" onclick="window.open('https://polymarket.com/event/${s.market_id}','_blank')">
    <div class="card-header">
      <div class="question">${s.question.length > 80 ? s.question.slice(0,80)+"..." : s.question}</div>
      <div class="signal-badge ${s.signal}">${s.signal}</div>
    </div>
    <div style="font-size:10px;color:var(--text-dim);margin-bottom:8px">
      Confidence: <span style="color:var(--text);font-weight:700">${confPct}%</span>
    </div>
    <div class="confidence-bar"><div class="confidence-fill" style="width:${confPct}%"></div></div>
    <div class="card-stats">
      <div class="card-stat">
        <div class="card-stat-label">Price YES</div>
        <div class="card-stat-value neutral">${(s.current_price*100).toFixed(1)}c</div>
      </div>
      <div class="card-stat">
        <div class="card-stat-label">24h Delta</div>
        <div class="card-stat-value ${diff24Color}">${diff24Sign}${(s.diff24*100).toFixed(1)}c</div>
      </div>
      <div class="card-stat">
        <div class="card-stat-label">Z-Score</div>
        <div class="card-stat-value ${zColor}">${s.zscore.toFixed(2)}</div>
      </div>
    </div>
    <div class="category-tag">${s.category}</div>
    <div class="volume">24h Vol: ${vol} · ${s.n_candles} candles analyzed</div>
  </div>`;
}

loadSignals();
setInterval(loadSignals, 60000);
</script>
</body>
</html>
